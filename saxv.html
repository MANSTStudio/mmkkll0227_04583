<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد ملكة الكون بعدها بتفلح 🌸👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffc0cb;
            --hot-pink: #ff69b4;
            --deep-pink: #ff1493;
            --white-glass: rgba(255, 255, 255, 0.85);
            --glow-color: rgba(255, 105, 180, 0.6);
            --status-offline: #747f8d;
            --status-online: #43b581;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: #ffe4e1;
            display: flex;
            flex-direction: column; /* للسماح بالعناصر تحت بعض */
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        /* تأثير الخلفية المتدرجة المتحركة */
        .background-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #fff5f7, #ffc0cb, #ffe4e1, #fff5f7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .heart-rain {
            position: absolute;
            color: white;
            font-size: 22px;
            animation: rain 7s linear infinite;
            pointer-events: none;
            filter: drop-shadow(0 0 5px var(--hot-pink));
        }

        @keyframes rain {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* تأثير النجوم اللامعة */
        .sparkle {
            position: absolute;
            width: 6px; height: 6px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            animation: sparkleAnim 1s linear forwards;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(20px); opacity: 0; }
        }

        .container {
            width: 85%;
            max-width: 480px;
            background: var(--white-glass);
            border: 8px solid white;
            border-radius: 50px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px var(--glow-color);
            backdrop-filter: blur(12px);
            z-index: 1;
            border-bottom: 15px solid rgba(255, 105, 180, 0.3); /* تأثير عمق */
            animation: float 4s ease-in-out infinite;
            margin-bottom: 50px; /* مسافة للأرشيف */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .friend-img-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .friend-img-container::after {
            content: '👑';
            position: absolute;
            top: -20px; right: -10px;
            font-size: 40px;
            transform: rotate(15deg);
        }

        .friend-img {
            width: 210px; height: 210px;
            border-radius: 50%;
            border: 6px solid white;
            outline: 6px solid var(--hot-pink);
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.5s;
        }

        /* ميزة حالة الديسكورد */
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid var(--soft-pink);
            width: fit-content;
            margin: -10px auto 15px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #d63384;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--status-offline);
            transition: background 0.3s;
        }

        h1 {
            color: var(--hot-pink);
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 3px 3px 0 white;
        }

        .subtitle {
            color: #d63384;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .text-box {
            background: white;
            padding: 20px;
            border-radius: 25px;
            color: #d63384;
            font-size: 1.2rem;
            border: 2px solid var(--soft-pink);
            position: relative;
        }

        .text-box::before {
            content: '✨'; position: absolute; left: 10px; top: 5px;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .cute-btn {
            padding: 15px 35px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 #c71585; /* تأثير 3D */
            text-decoration: none;
            width: 80%;
            position: relative;
            top: 0;
        }

        .cute-btn:active {
            top: 5px;
            box-shadow: 0 2px 0 #c71585;
        }

        .music-btn { background: var(--hot-pink); }
        .profile-btn { background: #5865F2; box-shadow: 0 8px 0 #3a45a5; }
        .profile-btn:active { box-shadow: 0 2px 0 #3a45a5; }

        .cute-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- قسم أرشيف الأميرة الجديد --- */
        .archive-section {
            width: 90%;
            max-width: 900px;
            background: var(--white-glass);
            border-radius: 40px;
            padding: 30px;
            border: 5px solid white;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1;
            text-align: center;
        }

        .archive-title {
            color: var(--deep-pink);
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 900;
            text-shadow: 2px 2px 0 white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .archive-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
            cursor: pointer;
            background: white;
        }

        .archive-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            transition: 0.5s;
        }

        .archive-item:hover {
            transform: translateY(-8px) scale(1.05);
            border-color: var(--hot-pink);
            box-shadow: 0 10px 25px var(--glow-color);
        }

        .archive-item:hover img {
            filter: brightness(0.8);
        }

        .download-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            background: rgba(255, 105, 180, 0.3);
            transition: 0.3s;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .archive-item:hover .download-overlay {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="background-animation" id="bg"></div>

    <audio id="mySong" loop>
        <source src="cute.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="friend-img-container">
            <img src="myfriend.webp" class="friend-img" alt="فيفي">
        </div>

        <div class="status-badge">
            <div class="status-dot" id="discordStatus"></div>
            <span id="statusText">جاري فحص الحالة...</span>
        </div>

        <h1>فيفي ملكة الكون ✨👑</h1>
        <div class="subtitle">نجمة تلمع في سماء الفخامة 🌸</div>
       
        <div class="text-box">
            🎀 <b>أهلاً بكم في عالم اللطافة!</b> 🎀<br>
            حيث السيطرة لجمال الملكة فيفي..<br>
           
          ✨ نورتوا المملكة بطلتكم! ✨
         
            😍 اسمي حمودي احب البيض 😍
        </div>

        <div class="button-group">
            <button class="cute-btn music-btn" onclick="playMusic()" id="btnText">🎶 تشغيل الاغنيه 🎶</button>
            <a href="https://discord.com/users/1406554910753030265" target="_blank" class="cute-btn profile-btn">🤝 حساب ديسكورد</a>
        </div>
    </div>

    <div class="archive-section">
        <div class="archive-title">📸 أرشيف الأميرة 📸</div>
        <div class="gallery-grid">
            
            <a href="cutz1 (1).webp" download class="archive-item">
                <img src="cutz1 (1).webp" alt="Princess Photo">
                <div class="download-overlay">📥 تحميل</div>
            </a>

            <a href="cutz1 (2).webp" download class="archive-item">
                <img src="cutz1 (2).webp" alt="Princess Photo">
                <div class="download-overlay">📥 تحميل</div>
            </a>

            <a href="cutz1 (3).webp" download class="archive-item">
                <img src="cutz1 (3).webp" alt="Princess Photo">
                <div class="download-overlay">📥 تحميل</div>
            </a>

            <a href="cutz1 (4).png" download class="archive-item">
                <img src="cutz1 (4).png" alt="Princess Photo">
                <div class="download-overlay">📥 تحميل</div>
            </a>

            <a href="cutz1 (5).png" download class="archive-item">
                <img src="cutz1 (5).png" alt="Princess Photo">
                <div class="download-overlay">📥 تحميل</div>
            </a>

            <a href="CUTEma.png" download class="archive-item">
                <img src="CUTEma.png" alt="Princess Photo">
                <div class="download-overlay">📥 تحميل</div>
            </a>

        </div>
    </div>

<script>
    const bg = document.getElementById('bg');
    const heartSymbols = ['🌸', '✨', '💖', '👑', '🎀'];

    // مطر القلوب
    function createRainHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart-rain';
        heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
        heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
        bg.appendChild(heart);
        setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createRainHeart, 300);

    // تأثير اللمعان عند تحريك الماوس
    document.addEventListener('mousemove', (e) => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = e.pageX + 'px';
        sparkle.style.top = e.pageY + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
    });

    const song = document.getElementById('mySong');
    const btn = document.getElementById('btnText');
    let isTransitioning = false;

    async function playMusic() {
        if (isTransitioning) return;
        try {
            if (song.paused) {
                isTransitioning = true;
                await song.play();
                btn.innerText = "⏸️ إيقاف اللحن الملكي";
            } else {
                song.pause();
                btn.innerText = "🎵 تشغيل اللحن الملكي 🎵";
            }
        } catch (error) {
            console.log("خطأ بسيط، جرب تضغط مرة ثانية.");
        } finally {
            isTransitioning = false;
        }
    }

    // جلب حالة الديسكورد
    const USER_ID = "1406554910753030265";
    const statusDot = document.getElementById('discordStatus');
    const statusText = document.getElementById('statusText');

    async function fetchDiscordStatus() {
        try {
            const response = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
            const data = await response.json();

            if (data.success) {
                const status = data.data.discord_status;
                if (status === "online" || status === "dnd" || status === "idle") {
                    statusDot.style.backgroundColor = "var(--status-online)";
                    statusText.innerText = "الأميرة متصلة الآن ✨";
                } else {
                    statusDot.style.backgroundColor = "var(--status-offline)";
                    statusText.innerText = "الأميرة في استراحة 🌙";
                }
            }
        } catch (error) {
            statusText.innerText = "الحالة غير متوفرة";
        }
    }

    fetchDiscordStatus();
    setInterval(fetchDiscordStatus, 30000); // تحديث الحالة كل 30 ثانية
</script>
</body>
</html>
